<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>致妈妈 · 三八妇女节</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="flowers" aria-hidden="true">
    <span class="flower">🌸</span>
    <span class="flower">🌷</span>
    <span class="flower">💐</span>
    <span class="flower">🌺</span>
    <span class="flower">🌼</span>
  </div>

  <main class="card">
    <header class="header">
      <p class="date">三月八日 · 国际妇女节</p>
      <h1 class="title">亲爱的妈妈</h1>
    </header>

    <div class="photo-wrap">
      <img src="assets/mom.png" alt="妈妈" class="photo" />
    </div>

    <section class="message">
      <p>谢谢您一直以来的付出与包容，</p>
      <p>谢谢您用温柔与坚韧撑起我们的家。</p>
      <p class="highlight">今天属于您，愿您健康、快乐、被世界温柔以待。</p>
      <p>—— 永远爱您的孩子</p>
    </section>

    <footer class="footer">
      <span class="heart" id="heart">❤️</span>
      <p>祝妈妈节日快乐</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
